<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0f17">
<title>Nick's Workout Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workouts">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0f17; --bg2:#121826; --card:#161d2e; --card2:#1c2438;
    --line:#26304a; --txt:#e8ecf5; --mut:#8a96b0; --mut2:#5c6580;
    --acc:#5b8cff; --acc2:#3d6bff; --good:#37d399; --warn:#ffb02e; --bad:#ff5d6c;
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{padding-bottom:84px;max-width:600px;margin:0 auto;min-height:100vh}
  a{color:var(--acc)}
  .hide{display:none!important}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 70%,transparent);
    padding:18px 18px 10px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.3px}
  header .sub{color:var(--mut);font-size:12px;margin-top:2px}
  .page{padding:4px 16px 20px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
  .card h2{font-size:14px;margin:0 0 12px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px}
  .stat .n{font-size:26px;font-weight:750;letter-spacing:-.5px}
  .stat .l{font-size:12px;color:var(--mut);margin-top:2px}
  .stat .d{font-size:12px;margin-top:4px;font-weight:600}
  .up{color:var(--good)} .down{color:var(--bad)} .flat{color:var(--mut)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:15px}
  .btn{background:var(--acc2);color:#fff;padding:14px 16px;width:100%;font-weight:650;
    box-shadow:0 6px 18px -8px var(--acc2);transition:transform .05s}
  .btn:active{transform:scale(.985)}
  .btn.sec{background:var(--card2);color:var(--txt);box-shadow:none;border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--mut);box-shadow:none}
  .btn.sm{padding:9px 12px;width:auto;font-size:13px;border-radius:10px}
  .btn.danger{background:transparent;color:var(--bad);border:1px solid #3a2330}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    color:var(--txt);padding:9px 13px;border-radius:999px;font-size:13.5px;font-weight:600;margin:0 8px 8px 0}
  .chip.on{background:var(--acc2);border-color:var(--acc2);color:#fff}
  input,select{font-family:inherit;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:11px 12px;font-size:16px;width:100%;outline:none}
  input:focus,select:focus{border-color:var(--acc)}
  label.fld{display:block;font-size:12px;color:var(--mut);margin:0 0 5px;font-weight:600}
  nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(16,21,34,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;max-width:600px;margin:0 auto;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  nav button{flex:1;background:none;color:var(--mut2);display:flex;flex-direction:column;align-items:center;
    gap:3px;font-size:11px;font-weight:600;padding:5px 0}
  nav button.on{color:var(--acc)}
  nav svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .exh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .exh .nm{font-weight:700;font-size:16px}
  .exh .mg{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 36px;gap:8px;align-items:center;margin-bottom:8px}
  .setrow .sn{color:var(--mut);font-size:13px;font-weight:700;text-align:center}
  .setrow .x{color:var(--mut2);text-align:center;font-size:20px;background:none;padding:0}
  .setlbl{display:grid;grid-template-columns:34px 1fr 1fr 36px;gap:8px;font-size:11px;color:var(--mut);
    margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .setlbl span{text-align:center}
  .last{font-size:11px;color:var(--mut2);margin-top:-2px;margin-bottom:8px;padding-left:42px}
  .wk{border-left:3px solid var(--acc2);padding:2px 0 2px 12px;margin-bottom:14px}
  .wk .dt{font-weight:700;font-size:15px}
  .wk .meta{color:var(--mut);font-size:12.5px;margin-top:2px}
  .wk .ex{color:var(--mut);font-size:13px;margin-top:6px;line-height:1.5}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:8px;
    padding:2px 7px;font-size:11px;margin:2px 4px 2px 0;color:var(--txt)}
  .row{display:flex;gap:10px;align-items:center}
  .sp{justify-content:space-between}
  .muted{color:var(--mut)}
  .center{text-align:center}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--good);color:#06231a;
    padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;z-index:60;box-shadow:0 10px 30px -10px #000;
    animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;
    animation:rot .8s linear infinite;margin:40px auto}
  @keyframes rot{to{transform:rotate(360deg)}}
  .seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:14px}
  .seg button{flex:1;background:none;color:var(--mut);padding:8px;font-size:13px;font-weight:650;border-radius:8px}
  .seg button.on{background:var(--acc2);color:#fff}
  canvas{max-width:100%}
  .ovr{position:fixed;inset:0;background:rgba(6,9,16,.6);z-index:50;display:flex;align-items:flex-end;
    justify-content:center;backdrop-filter:blur(3px)}
  .sheet{background:var(--bg2);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:600px;
    max-height:80vh;overflow:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom));animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .exopt{padding:13px 6px;border-bottom:1px solid var(--line);font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .exopt .mg{font-size:11px;color:var(--mut)}
  .search{position:sticky;top:0;background:var(--bg2);padding-bottom:10px}
  /* active workout */
  .pbar{height:8px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:2px 0 4px}
  .pbar>div{height:100%;background:var(--good);width:0;transition:width .25s}
  .aset{display:flex;align-items:center;gap:12px;padding:13px 12px;border:1px solid var(--line);border-radius:12px;
    margin-bottom:8px;background:var(--bg2);cursor:pointer;transition:.12s;user-select:none}
  .aset:active{transform:scale(.99)}
  .aset .ck{width:26px;height:26px;border-radius:50%;border:2px solid var(--mut2);flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-size:15px;color:#06231a;font-weight:800}
  .aset .ainfo{font-size:16px;font-weight:600}
  .aset .asn{margin-left:auto;font-size:12px;color:var(--mut)}
  .aset.done{background:rgba(55,211,153,.1);border-color:rgba(55,211,153,.45)}
  .aset.done .ck{background:var(--good);border-color:var(--good)}
  .aset.done .ainfo{color:var(--mut);text-decoration:line-through}
  /* rest timer */
  .restbar{position:fixed;left:50%;transform:translateX(-50%);bottom:92px;z-index:40;
    width:calc(100% - 28px);max-width:572px;display:flex;align-items:center;gap:12px;
    background:var(--card2);border:1px solid var(--acc2);border-radius:14px;padding:11px 14px;
    box-shadow:0 14px 34px -12px #000;animation:up .2s ease}
  .restbar.done{border-color:var(--good);background:rgba(55,211,153,.14)}
  .restbar .rtime{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;min-width:60px}
  .restbar.done .rtime{color:var(--good)}
  .restbar .rlbl{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .restbar .rsp{margin-left:auto;display:flex;gap:8px}
  .restbar button{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:8px 12px;
    border-radius:10px;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<nav id="nav" class="hide">
  <button data-tab="today" class="on"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>Today</button>
  <button data-tab="log"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Log</button>
  <button data-tab="history"><svg viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 3"/></svg>History</button>
  <button data-tab="progress"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg>Progress</button>
</nav>
<div id="rest" class="restbar hide">
  <div class="rtime" id="rtime">3:00</div>
  <div class="rlbl" id="rlbl">Rest</div>
  <div class="rsp"><button onclick="addRest(30)">+30s</button><button onclick="stopRest()">Skip</button></div>
</div>

<script>
const SUPABASE_URL='https://xemdbsatlbggaszpoivq.supabase.co';
const SUPABASE_KEY='sb_publishable_WP5FED21_Cw4ZaZQEpYqxA_I1GsrO3Z';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ---- Passcode gate (change PASSCODE to whatever you like) ----
const PASSCODE='1337';
function gate(){
  return new Promise(res=>{
    if(localStorage.getItem('wt_ok')==='1'){res();return}
    app.innerHTML=`<div class="page" style="min-height:88vh;display:flex;flex-direction:column;justify-content:center">
      <div class="card" style="text-align:center;padding:28px 20px">
        <div style="font-size:44px;margin-bottom:6px">🏋️</div>
        <div style="font-size:19px;font-weight:750;margin-bottom:16px">Nick's Workout Tracker</div>
        <input id="pc" type="password" inputmode="text" placeholder="Passcode" style="text-align:center;margin-bottom:12px">
        <button class="btn" id="pcgo">Unlock</button>
        <div id="pcerr" style="margin-top:10px;font-size:13px;color:var(--bad);min-height:16px"></div>
      </div></div>`;
    const go=()=>{const v=document.querySelector('#pc').value;
      if(v===PASSCODE){localStorage.setItem('wt_ok','1');res()}
      else{document.querySelector('#pcerr').textContent='Incorrect passcode';document.querySelector('#pc').value=''}};
    document.querySelector('#pcgo').onclick=go;
    document.querySelector('#pc').onkeydown=e=>{if(e.key==='Enter')go()};
    document.querySelector('#pc').focus();
  });
}

const $=s=>document.querySelector(s);
const app=$('#app');
const fmt=n=>n==null?'':(Math.round(n*10)/10).toString();
const todayISO=()=>new Date().toLocaleDateString('en-CA');
const niceDate=d=>{const[y,m,da]=d.split('-');return new Date(y,m-1,da).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})};
const niceDateY=d=>{const[y,m,da]=d.split('-');return new Date(y,m-1,da).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1900)}

const DB={exercises:[],templates:[]};
async function loadCore(){
  const {data:ex}=await sb.from('wt_exercises').select('*').order('name');
  DB.exercises=ex||[];
  const {data:tpl}=await sb.from('wt_templates')
    .select('id,name,position,wt_template_exercises(position,target_sets,target_reps,exercise_id)')
    .order('position');
  DB.templates=(tpl||[]).map(t=>({...t,exs:(t.wt_template_exercises||[]).sort((a,b)=>a.position-b.position)}));
}
function exName(id){const e=DB.exercises.find(x=>x.id===id);return e?e.name:'?'}
function exById(id){return DB.exercises.find(x=>x.id===id)}
async function lastFor(exId){
  const {data}=await sb.from('wt_sets')
    .select('reps,weight,wt_workouts!inner(date)')
    .eq('exercise_id',exId).order('id',{ascending:false}).limit(1);
  if(data&&data[0])return {reps:data[0].reps,weight:data[0].weight,date:data[0].wt_workouts.date};
  return null;
}

let TAB='today';
function setTab(t){TAB=t;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  ({today:renderToday,log:renderLog,history:renderHistory,progress:renderProgress})[t]();window.scrollTo(0,0)}

async function renderToday(){
  app.innerHTML=`<header><div><h1>Today</h1><div class="sub">${niceDateY(todayISO())}</div></div></header>
    <div class="page"><div class="spin"></div></div>`;
  const sinceW=new Date(Date.now()-7*864e5).toLocaleDateString('en-CA');
  const since30=new Date(Date.now()-30*864e5).toLocaleDateString('en-CA');
  const [{data:wks},{data:wmeta},{data:weighs},{count:total}]=await Promise.all([
    sb.from('wt_workouts').select('id,date,name').order('date',{ascending:false}).limit(60),
    sb.from('wt_sets').select('weight,reps,wt_workouts!inner(date)').gte('wt_workouts.date',since30),
    sb.from('wt_weigh_ins').select('date,weight').order('date',{ascending:false}).limit(60),
    sb.from('wt_workouts').select('*',{count:'exact',head:true})
  ]);
  const weekCount=(wks||[]).filter(w=>w.date>=sinceW).length;
  const last=wks&&wks[0]?wks[0].date:null;
  const daysSince=last?Math.floor((new Date(todayISO())-new Date(last))/864e5):null;
  let vol30=0;(wmeta||[]).forEach(s=>{vol30+=(s.weight||0)*(s.reps||0)});
  let wNow=null,wPrev=null,wDelta=null;
  if(weighs&&weighs.length){wNow=weighs[0].weight;const old=weighs.find(x=>x.date<=new Date(Date.now()-14*864e5).toLocaleDateString('en-CA'))||weighs[weighs.length-1];wPrev=old.weight;wDelta=wNow-wPrev}
  const dirCls=d=>d==null?'flat':d<0?'up':d>0?'down':'flat';
  app.innerHTML=`<header><div><h1>Today</h1><div class="sub">${niceDateY(todayISO())}</div></div>
    <button class="btn ghost sm" onclick="lock()" title="Lock">🔒</button></header>
  <div class="page">
    <button class="btn" onclick="setTab('log')" style="margin-bottom:16px">+ Start a workout</button>
    <div class="grid2">
      <div class="stat"><div class="n">${weekCount}</div><div class="l">Workouts this week</div></div>
      <div class="stat"><div class="n">${daysSince==null?'–':daysSince===0?'Today':daysSince+'d'}</div><div class="l">Since last workout</div></div>
      <div class="stat"><div class="n">${total}</div><div class="l">Total sessions logged</div></div>
      <div class="stat"><div class="n">${wNow?fmt(wNow):'–'}<span style="font-size:13px;color:var(--mut)"> lb</span></div>
        <div class="l">Body weight</div>${wDelta!=null?`<div class="d ${dirCls(wDelta)}">${wDelta>0?'+':''}${fmt(wDelta)} lb / 2wk</div>`:''}</div>
    </div>
    <div class="card"><h2>30-day volume</h2>
      <div style="font-size:30px;font-weight:750;letter-spacing:-.5px">${Math.round(vol30).toLocaleString()}<span style="font-size:14px;color:var(--mut);font-weight:600"> lb lifted</span></div>
    </div>
    <div class="card"><div class="row sp"><h2 style="margin:0">Recent</h2><button class="btn ghost sm" onclick="setTab('history')">All →</button></div>
      <div id="recent" style="margin-top:12px"></div></div>
  </div>`;
  const rc=$('#recent');
  if(!wks||!wks.length){rc.innerHTML='<div class="muted center">No workouts yet — tap “Start a workout”.</div>';return}
  for(const w of wks.slice(0,4)){
    const {data:s}=await sb.from('wt_sets').select('exercise_id,completed').eq('workout_id',w.id);
    const names=[...new Set((s||[]).map(x=>exName(x.exercise_id)))];
    const inprog=(s||[]).some(x=>!x.completed);
    const d=document.createElement('div');d.className='wk';d.style.cursor='pointer';d.onclick=()=>openWorkout(w.id);
    d.innerHTML=`<div class="dt">${niceDate(w.date)}${inprog?' <span style="color:var(--warn);font-size:12px;font-weight:700">• In progress</span>':''}</div><div class="meta">${names.length} exercises · ${(s||[]).length} sets</div>
      <div class="ex">${names.slice(0,6).map(n=>`<span class="pill">${n}</span>`).join('')}${names.length>6?'…':''}</div>`;
    rc.appendChild(d);
  }
}

let SESSION=null;
async function renderLog(){
  if(SESSION){return renderActiveSession()}
  app.innerHTML=`<header><div><h1>Log workout</h1><div class="sub">Pick a routine or start blank</div></div></header>
  <div class="page">
    <button class="btn" onclick="newRoutine()" style="margin-bottom:14px">+ Create new workout</button>
    <div class="card"><h2>Your routines</h2><div id="tpls"></div></div>
    <button class="btn sec" onclick="startSession(null)">Start blank workout</button>
  </div>`;
  const c=$('#tpls');
  DB.templates.forEach(t=>{
    const b=document.createElement('button');b.className='chip';b.textContent=`${t.name} · ${t.exs.length}`;
    b.onclick=()=>startSession(t);c.appendChild(b);
  });
  if(!DB.templates.length)c.innerHTML='<div class="muted">No routines.</div>';
}

// ---- Build a new reusable routine from the full exercise catalog ----
let NR_SEL=[];
function newRoutine(){
  NR_SEL=[];
  const groups={};
  DB.exercises.forEach(e=>{(groups[e.muscle_group]=groups[e.muscle_group]||[]).push(e)});
  const order=['Chest','Back','Shoulders','Arms','Legs','Core','Cardio','Other'];
  const gkeys=Object.keys(groups).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib)});
  let cat='';
  gkeys.forEach(g=>{
    cat+=`<div class="card"><h2>${g}</h2><div>`;
    groups[g].sort((a,b)=>a.name.localeCompare(b.name)).forEach(e=>{
      cat+=`<button class="chip" data-ex="${e.id}" onclick="toggleNR(${e.id},this)">${e.name}</button>`});
    cat+=`</div></div>`;
  });
  app.innerHTML=`<header><div><h1>New workout</h1><div class="sub">Tap exercises to add</div></div>
    <button class="btn ghost sm" onclick="renderLog()">Cancel</button></header>
  <div class="page">
    <div class="card"><label class="fld">Name (optional)</label><input id="rname" placeholder="My Workout"></div>
    ${cat}
    <div style="height:6px"></div>
    <button class="btn" id="nrsave" onclick="saveRoutine()">Save & start workout (0)</button>
  </div>`;
}
function toggleNR(id,btn){
  const i=NR_SEL.indexOf(id);
  if(i>=0){NR_SEL.splice(i,1);btn.classList.remove('on')}
  else{NR_SEL.push(id);btn.classList.add('on')}
  $('#nrsave').textContent=`Save & start workout (${NR_SEL.length})`;
}
async function saveRoutine(){
  if(!NR_SEL.length){alert('Tap at least one exercise to add.');return}
  let name=($('#rname').value||'').trim();
  if(!name)name='My Workout '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  let base=name,n=2;
  while(DB.templates.some(t=>t.name.toLowerCase()===name.toLowerCase())){name=base+' ('+(n++)+')'}
  const {data:tpl,error}=await sb.from('wt_templates').insert({name,position:DB.templates.length}).select().single();
  if(error){alert('Could not save: '+error.message);return}
  const rows=NR_SEL.map((exId,i)=>({template_id:tpl.id,exercise_id:exId,position:i,target_sets:3,target_reps:8}));
  const {error:e2}=await sb.from('wt_template_exercises').insert(rows);
  if(e2){alert('Could not save exercises: '+e2.message);return}
  await loadCore();
  toast('Routine saved 💾');
  startSession(DB.templates.find(t=>t.id===tpl.id));
}

async function startSession(t){
  SESSION={date:todayISO(),template_id:t?t.id:null,name:t?t.name:'Workout',items:[]};
  if(t){for(const e of t.exs){SESSION.items.push({exId:e.exercise_id,sets:[]})}}
  renderActiveSession();

function addSet(i){const it=SESSION.items[i];const prev=it.sets[it.sets.length-1]||{};

function fillExercise(i){const it=SESSION.items[i];

async function saveSession(){
  const items=SESSION.items.filter(it=>it.sets.some(s=>s.weight!==''||s.reps!==''));
  if(!items.length){alert('Add at least one set before saving.');return}
  const {data:wk,error:e1}=await sb.from('wt_workouts')
    .insert({date:SESSION.date,name:SESSION.name,template_id:SESSION.template_id}).select().single();
  if(e1){alert('Save failed: '+e1.message);return}
  const rows=[];const cardio=[];
  items.forEach(it=>{const ex=exById(it.exId);
    it.sets.forEach((s,i)=>{
      if(s.weight===''&&s.reps==='')return;

async function toggleSet(id,el){
  const now=!el.classList.contains('done');

  if(now){ensureNotify();startRest();}

}

// ---- Rest timer (configurable) ----
let REST={end:0,iv:null,ac:null};
let restSecs=parseInt(localStorage.getItem('wt_rest'))||180;
const REST_OPTS=[60,90,120,150,180,300];
function restChips(){
  return `<div class="rlbl" style="margin-bottom:8px">Rest length</div><div>`+
    REST_OPTS.map(s=>`<button class="chip rchip ${s===restSecs?'on':''}" data-s="${s}" onclick="setRestLen(${s})">${fmtT(s)}</button>`).join('')+`</div>`;
}
function setRestLen(s){restSecs=s;localStorage.setItem('wt_rest',s);
  document.querySelectorAll('.rchip').forEach(c=>c.classList.toggle('on',+c.dataset.s===s));}
function ensureNotify(){try{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission()}catch(e){}}
function fmtT(s){const m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0')}
function beep(){try{REST.ac=REST.ac||new (window.AudioContext||window.webkitAudioContext)();const ac=REST.ac;
  [0,260,520].forEach(t=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=880;
    o.connect(g);g.connect(ac.destination);const s=ac.currentTime+t/1000;g.gain.setValueAtTime(.0001,s);
    g.gain.exponentialRampToValueAtTime(.4,s+.02);g.gain.exponentialRampToValueAtTime(.0001,s+.2);o.start(s);o.stop(s+.22)})}catch(e){}}
// Screen wake lock keeps the screen on during rest so the timer reliably fires
let wantWake=false,wakeLock=null;
async function acquireWake(){wantWake=true;try{if('wakeLock'in navigator&&!wakeLock){wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>{wakeLock=null})}}catch(e){}}
function releaseWake(){wantWake=false;try{if(wakeLock){wakeLock.release();wakeLock=null}}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(wantWake&&document.visibilityState==='visible')acquireWake()});
function startRest(){
  const bar=$('#rest');bar.classList.remove('hide','done');$('#rlbl').textContent='Rest';
  REST.end=Date.now()+restSecs*1000;
  if(REST.iv)clearInterval(REST.iv);
  try{REST.ac=REST.ac||new (window.AudioContext||window.webkitAudioContext)();if(REST.ac.state==='suspended')REST.ac.resume()}catch(e){}
  acquireWake();
  tickRest();REST.iv=setInterval(tickRest,250);
}
function tickRest(){
  const left=Math.round((REST.end-Date.now())/1000);
  if(left<=0){$('#rtime').textContent='0:00';clearInterval(REST.iv);REST.iv=null;restDone();return}
  $('#rtime').textContent=fmtT(left);
}
function restDone(){
  const bar=$('#rest');bar.classList.add('done');$('#rlbl').textContent='Rest done!';
  beep();try{navigator.vibrate&&navigator.vibrate([300,120,300])}catch(e){}
  try{if('Notification'in window&&Notification.permission==='granted')new Notification('Rest over 💪',{body:'Time for your next set',tag:'wt-rest'})}catch(e){}
  releaseWake();
  setTimeout(()=>{if(!REST.iv)$('#rest').classList.add('hide')},10000);
}
function addRest(s){if($('#rest').classList.contains('hide'))return;REST.end=Math.max(Date.now(),REST.end)+s*1000;
  $('#rest').classList.remove('done');$('#rlbl').textContent='Rest';if(!REST.iv)REST.iv=setInterval(tickRest,250);tickRest()}
function stopRest(){if(REST.iv)clearInterval(REST.iv);REST.iv=null;releaseWake();$('#rest').classList.add('hide')}

  mkChart($('#cw'),{type:'line',data:{labels,datasets:[{label:'Weight (lb)',data:vals,borderColor:'#ffb02e',
    backgroundColor:c=>grad(c.chart.ctx),fill:true,tension:.3,pointRadius:0,borderWidth:2.5}]},options:chartOpts()});
}
function addWeigh(){
  const ov=document.createElement('div');ov.className='ovr';ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="sheet">
    <div style="font-size:17px;font-weight:750;margin-bottom:14px">Add weight</div>
    <label class="fld">Weight (lb)</label>
    <input id="wv" inputmode="decimal" placeholder="e.g. 205" style="margin-bottom:12px">
    <label class="fld">Date</label>
    <input id="wd" type="date" value="${todayISO()}" max="${todayISO()}" style="margin-bottom:16px">
    <button class="btn" id="wsave">Save</button>
    <button class="btn ghost" id="wcancel" style="margin-top:8px">Cancel</button>
    <div id="werr" style="color:var(--bad);font-size:13px;margin-top:8px;min-height:14px"></div>
  </div>`;
  document.body.appendChild(ov);
  const wv=ov.querySelector('#wv');setTimeout(()=>wv.focus(),50);
  ov.querySelector('#wcancel').onclick=()=>ov.remove();
  ov.querySelector('#wsave').onclick=async()=>{
    const w=parseFloat(wv.value),d=ov.querySelector('#wd').value;
    if(isNaN(w)||!d){ov.querySelector('#werr').textContent='Enter a weight and a date.';return}
    const {error}=await sb.from('wt_weigh_ins').upsert({date:d,weight:w},{onConflict:'date'});
    if(error){ov.querySelector('#werr').textContent=error.message;return}
    ov.remove();toast('Weight logged');progWeight();
  };
}
async function progCardio(){
  const body=$('#pbody');
  const {data}=await sb.from('wt_cardio').select('date,duration,distance,exercise_id').order('date');
  if(!data||!data.length){body.innerHTML='<div class="card muted center">No cardio logged yet.</div>';return}
  const types=[...new Set(data.map(d=>d.exercise_id))];
  const sel=window.__pcar&&types.includes(+window.__pcar)?+window.__pcar:types[0];window.__pcar=sel;
  body.innerHTML=`<div class="card"><label class="fld">Activity</label>
    <select id="csel">${types.map(t=>`<option value="${t}" ${t==sel?'selected':''}>${exName(t)}</option>`).join('')}</select></div>
    <div class="card"><h2>Distance / Level</h2><canvas id="cc1" height="190"></canvas></div>
    <div class="card"><h2>Duration (min)</h2><canvas id="cc2" height="190"></canvas></div>`;
  $('#csel').onchange=e=>{window.__pcar=+e.target.value;progCardio()};
  const f=data.filter(d=>d.exercise_id==sel);const labels=f.map(d=>niceDate(d.date));
  mkChart($('#cc1'),{type:'line',data:{labels,datasets:[{label:'Dist/Level',data:f.map(d=>d.distance),
    borderColor:'#5b8cff',tension:.3,pointRadius:2,borderWidth:2.5}]},options:chartOpts()});
  new Chart($('#cc2').getContext('2d'),{type:'bar',data:{labels,datasets:[{label:'Min',data:f.map(d=>d.duration),
    backgroundColor:'#37d39988',borderRadius:5}]},options:chartOpts()});
}
function chartOpts(){return{responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c2438',padding:10,cornerRadius:8}},
  scales:{x:{grid:{display:false},ticks:{maxTicksLimit:6,maxRotation:0}},
    y:{grid:{color:'#1c2438'},ticks:{maxTicksLimit:5}}}}}

function lock(){localStorage.removeItem('wt_ok');location.reload()}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
(async function init(){
  await gate();
  try{await loadCore()}catch(e){app.innerHTML=`<div class="page"><div class="card">Couldn’t connect to the database.<br><span class="muted">${e.message}</span></div></div>`;return}
  $('#nav').classList.remove('hide');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  setTab('today');
})();
</script>
</body>
</html>
